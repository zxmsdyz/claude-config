# ============================================================
#  ~/.tmux.conf  —  针对多 Claude Code 会话管理优化
#  保存后执行：  tmux source-file ~/.tmux.conf
#  或在 tmux 内按： Prefix + r （见下方绑定）
# ============================================================

# ------------------------------------------------------------
# 基础行为
# ------------------------------------------------------------
# 自动重命名：窗口名跟随 Claude Code 写入的终端标题（= 当前任务摘要），
# 用 s/^. // 剥掉开头会变的 spinner 字符（⠂/⠄/⠆…）。
# 关键：命名来源是 pane_title(任务) 而非 pane_current_command(node/bash)，
# 所以既自动、又不会被 node 覆盖——新 tab 不再是 bash，也不用再手动改名。
# 想给某个窗口钉死手动名：手动 rename 一次即可，tmux 会对该窗口自动关掉 auto-rename。
setw -g automatic-rename on
setw -g automatic-rename-format '#{s/^. //:pane_title}'
set  -g allow-rename     off

# 窗口/面板从 1 开始编号（更顺手），关窗后自动重排序号
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on

# 更大的回滚缓冲，方便往回翻 CC 的长输出
set  -g history-limit 50000

# 几乎零延迟的 ESC（对 vim / CC 内编辑很重要）
set  -sg escape-time 10

# 开启鼠标：可点击切换窗口/面板、拖拽调整大小、滚轮翻历史
set  -g mouse on

# 终端真彩 + 256 色（让 CC 的高亮显示正常）
set  -g default-terminal "tmux-256color"
set  -ag terminal-overrides ",*256col*:RGB,xterm-256color:RGB"

# 透传扩展按键序列（让 Shift+Enter 等修饰键组合能传到 CC 里换行）
set  -s extended-keys on
set  -as terminal-features 'xterm*:extkeys'

# 聚焦事件（vim/CC 的自动重载等依赖它）
set  -g focus-events on

# ------------------------------------------------------------
# 快捷键
# ------------------------------------------------------------
# 重新加载配置：Prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded ✔"

# 分屏时保留当前目录（默认会跳回 home，跨项目时很烦）
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
# 新建窗口也保留当前目录
bind c   new-window      -c "#{pane_current_path}"

# 用 hjkl 在面板间移动（无需重复按 Prefix 也行，见下）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + 方向键：免 Prefix 直接切面板
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift + 左右：免 Prefix 切窗口（快速在多个 CC 间跳）
bind -n S-Left  previous-window
bind -n S-Right next-window

# copy 模式用 vi 键位
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ------------------------------------------------------------
# 面板边框标题 —— 多 pane 时一眼看清每个 pane 在跑什么
# 显示：面板号 + 当前命令 + 当前目录
# ------------------------------------------------------------
set  -g pane-border-status top
set  -g pane-border-format " #[bold]#{pane_index}#[default] #{pane_current_command}  #{pane_current_path} "
set  -g pane-border-style        "fg=colour240"
set  -g pane-active-border-style "fg=colour33,bold"

# ------------------------------------------------------------
# 状态栏 —— 窗口名 + 目录一目了然
# ------------------------------------------------------------
set  -g status on
set  -g status-interval 5
set  -g status-position bottom
set  -g status-justify left

set  -g status-style "bg=colour234,fg=colour250"

# 左侧：会话名
set  -g status-left-length 30
set  -g status-left "#[bg=colour33,fg=white,bold] #S #[bg=colour234,fg=colour33]"

# 普通窗口： 序号:窗口名
setw -g window-status-format         " #I:#W "
# 当前窗口：高亮 + 显示该窗口的工作目录尾部目录名
setw -g window-status-current-format "#[bg=colour33,fg=white,bold] #I:#W #[default]"
setw -g window-status-separator ""

# 有活动/告警的窗口标记一下（CC 跑完出提示音时会亮）
setw -g window-status-activity-style "fg=colour214,bold"
set  -g monitor-activity on
set  -g visual-activity off

# 右侧：当前面板工作目录 + 时间
set  -g status-right-length 80
set  -g status-right "#[fg=colour245]#{pane_current_path} #[fg=colour33]| #[fg=colour250]%m-%d %H:%M "

# ============================================================
#  小贴士（不是配置，仅备忘）
#  - Prefix + w   ：窗口总览，带实时内容预览（看每个 CC 在干嘛）
#  - Prefix + ,   ：重命名当前窗口（用任务名！如 obi-signal）
#  - Prefix + s   ：会话总览
#  - 命令行一键列出所有窗口在哪、跑什么：
#      tmux list-windows -a -F \
#        '#{session_name}:#{window_index} #{window_name} → #{pane_current_path} [#{pane_current_command}]'
# ============================================================

# ---- 插件 ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自动恢复：tmux 启动时自动还原上次保存的布局
set -g @continuum-restore 'on'
# 每 15 分钟自动保存一次（默认值，可改）
set -g @continuum-save-interval '15'
# 顺便把每个 pane 的滚动历史内容也存下来
set -g @resurrect-capture-pane-contents 'on'

# 这一行必须放在配置文件最后
run '~/.tmux/plugins/tpm/tpm'
